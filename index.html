<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Android 2.3 Network Test</title>
<style>
body { background:#000; color:#eee; font-family:Arial; padding:10px; }
h2 { margin-top:20px; }
.ok { color:#0f0; }
.fail { color:#f33; }
</style>
</head>
<body>

<h1>Android 2.3 Network Test</h1>
<p>This will show what your Kindle Fire can actually connect to.</p>

<div id="results"></div>

<script type="text/javascript">
// ES3 ONLY — works on Android 2.3

function test(url, label) {
    var div = document.createElement("div");
    div.innerHTML = label + ": testing...";
    document.getElementById("results").appendChild(div);

    var xhr = new XMLHttpRequest();
    xhr.open("GET", url + "?ts=" + new Date().getTime(), true);

    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status >= 200 && xhr.status < 400) {
                div.innerHTML = label + ": <span class='ok'>OK ✔</span>";
            } else {
                div.innerHTML = label + ": <span class='fail'>FAILED ✘</span>";
            }
        }
    };

    xhr.onerror = function() {
        div.innerHTML = label + ": <span class='fail'>FAILED ✘</span>";
    };

    try {
        xhr.send(null);
    } catch(e) {
        div.innerHTML = label + ": <span class='fail'>FAILED ✘</span>";
    }
}

test("http://example.com", "HTTP (old server)");
test("https://example.com", "HTTPS (old TLS)");
test("https://google.com", "HTTPS (modern TLS)");
test("https://yourusername.github.io/status.json", "GitHub Pages JSON");
test("https://api.twitch.tv/helix/streams?user_login=xqc", "Twitch API");
test("https://kick.com/api/v1/channels/xqc", "Kick API");

</script>

</body>
</html>
