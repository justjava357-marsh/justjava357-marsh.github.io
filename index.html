<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S-Tier Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
body{margin:0;background:#0a0a0a;color:#ddd;font-family:Arial,sans-serif}
#o{width:320px;background:#111;border:1px solid #222;margin:15px auto;padding:15px 12px;border-radius:8px}
.header{font-size:13px;font-weight:bold;margin-bottom:12px;color:#aaa;display:flex;align-items:center}
.dot{display:inline-block;width:9px;height:9px;background:#10b981;border-radius:50%;margin-right:7px}
.last{font-size:11px;color:#666;margin-left:auto}
.grid{white-space:nowrap}
.s{display:inline-block;width:72px;margin:6px 3px;text-align:center;vertical-align:top}
.iw{width:56px;height:56px;border:4px solid #ef4444;background:#1a1a1a;margin:0 auto 5px;border-radius:50%;overflow:hidden}
.iw.on{border-color:#10b981}
.iw.checking{border-color:#666}
.iw img{width:48px;height:48px;display:block;margin:4px auto 0;border-radius:50%}
.name{font-size:11px;word-break:break-all;color:#ccc}
#dbg{font-size:10px;color:#555;margin-top:12px;word-break:break-all;line-height:1.5}
</style>
</head>
<body>
<div id="o">
  <div class="header"><span class="dot"></span>LIVE STATUS<span id="last" class="last"></span></div>
  <div id="g" class="grid"></div>
  <div id="dbg"></div>
</div>

<script>
var TWITCH_CLIENT_ID = '3l5p1q1v5av0qkunjqsr18we0df3z3';
var TWITCH_CLIENT_SECRET = 'jwb7pmf4hbs8tds6wqdz6tbmfl6jbo';

var twitchToken = null;

var streamers = [
  {id:'s-xqc', name:'xqc', platform:'kick', username:'xqc'},
  {id:'s-tyler1', name:'loltyler1', platform:'twitch', username:'loltyler1'},
  {id:'s-ohne', name:'ohnePixel', platform:'twitch', username:'ohnePixel'},
  {id:'s-jerma', name:'Jerma985', platform:'twitch', username:'Jerma985'},
  {id:'s-hobbs', name:'WowHobbs', platform:'twitch', username:'WowHobbs'},
  {id:'s-thijs', name:'Thijs', platform:'twitch', username:'Thijs'},
  {id:'s-trick2g', name:'Trick2g', platform:'twitch', username:'Trick2g'},
  {id:'s-flight', name:'Flight23white', platform:'twitch', username:'Flight23white'}
];

function log(msg) {
  var el = document.getElementById('dbg');
  if (el) el.innerHTML += msg + '<br>';
}

function getXMLHttpRequest(url, method, headers, body, callback) {
  var xhr = new XMLHttpRequest();
  xhr.open(method, url, true);
  for (var h in headers) {
    if (headers.hasOwnProperty(h)) xhr.setRequestHeader(h, headers[h]);
  }
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) callback(xhr.status, xhr.responseText);
  };
  xhr.send(body);
}

function getTwitchToken(callback) {
  if (twitchToken) return callback(twitchToken);
  if (!TWITCH_CLIENT_ID || !TWITCH_CLIENT_SECRET) {
    log('no twitch creds');
    return callback(null);
  }
  var body = 'client_id=' + encodeURIComponent(TWITCH_CLIENT_ID) +
             '&client_secret=' + encodeURIComponent(TWITCH_CLIENT_SECRET) +
             '&grant_type=client_credentials';

  getXMLHttpRequest(
    'https://id.twitch.tv/oauth2/token',
    'POST',
    {'Content-Type': 'application/x-www-form-urlencoded'},
    body,
    function(status, text) {
      try {
        var d = JSON.parse(text);
        twitchToken = d.access_token || null;
        log('token: ' + (twitchToken ? 'ok' : 'failed'));
        callback(twitchToken);
      } catch(e) {
        log('token parse err');
        callback(null);
      }
    }
  );
}

function checkKick(username, callback) {
  getXMLHttpRequest(
    'https://kick.com/api/v1/channels/' + username,
    'GET', {}, null,
    function(status, text) {
      if (status !== 200) { log('kick/' + username + ' err'); callback(false); return; }
      try {
        var d = JSON.parse(text);
        callback(!!(d.livestream && d.livestream.is_live));
      } catch(e) {
        log('kick/' + username + ' parse err');
        callback(false);
      }
    }
  );
}

function checkTwitch(username, callback) {
  getTwitchToken(function(token) {
    if (!token) { callback(false); return; }
    getXMLHttpRequest(
      'https://api.twitch.tv/helix/streams?user_login=' + username,
      'GET',
      {'Client-ID': TWITCH_CLIENT_ID, 'Authorization': 'Bearer ' + token},
      null,
      function(status, text) {
        if (status !== 200) { log('twitch/' + username + ' err'); callback(false); return; }
        try {
          var d = JSON.parse(text);
          callback(!!(d.data && d.data.length > 0));
        } catch(e) {
          log('twitch/' + username + ' parse err');
          callback(false);
        }
      }
    );
  });
}

function updateLastTime() {
  var n = new Date();
  var h = ('0' + n.getHours()).slice(-2);
  var m = ('0' + n.getMinutes()).slice(-2);
  document.getElementById('last').innerHTML = ' • ' + h + ':' + m;
}

function updateLiveStatuses() {
  updateLastTime();
  document.getElementById('dbg').innerHTML = '';

  for (var i = 0; i < streamers.length; i++) {
    var el = document.getElementById(streamers[i].id);
    if (el) {
      var iw = el.getElementsByTagName('div')[0];
      if (iw) iw.className = 'iw checking';
    }
  }

  var done = 0;
  function checkOne(s) {
    var fn = s.platform === 'kick' ? checkKick : checkTwitch;
    fn(s.username, function(isLive) {
      log(s.name + ': ' + (isLive ? 'LIVE' : 'off'));
      var el = document.getElementById(s.id);
      if (el) {
        var iw = el.getElementsByTagName('div')[0];
        if (iw) iw.className = 'iw' + (isLive ? ' on' : '');
      }
      done++;
    });
  }

  for (var i = 0; i < streamers.length; i++) {
    checkOne(streamers[i]);
  }
}

function render() {
  var html = '';
  for (var i = 0; i < streamers.length; i++) {
    var s = streamers[i];
    html += '<div class="s" id="' + s.id + '">'
          + '<div class="iw">'
          + '<img src="https://picsum.photos/id/' + (100 + i) + '/48/48" alt="' + s.name + '">'
          + '</div>'
          + '<div class="name">' + s.name + '</div>'
          + '</div>';
  }
  document.getElementById('g').innerHTML = html;
}

window.onload = function() {
  render();
  updateLiveStatuses();
  setInterval(updateLiveStatuses, 180000);
};
</script>
</body>
</html>
