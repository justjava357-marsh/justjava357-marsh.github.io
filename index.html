<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Auto-refresh (10s)</title>

  <!-- Meta refresh fallback (works without JS) -->
  <meta http-equiv="refresh" content="10">
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:1rem}</style>
</head>
<body>
  <h1>Auto-refresh test</h1>
  <p id="time">Server/client time: unknown</p>
  <p>This page refreshes every 10 seconds. Meta refresh works without JS; JS adds a cache-busting query when available.</p>

  <script>
  (function(){
    // show local time
    function show(){ document.getElementById('time').textContent = new Date().toISOString().replace('T',' ').split('.')[0]; }
    show();

    // remove meta refresh so we control reloads when JS is allowed
    var metas = document.getElementsByTagName('meta');
    for(var i=0;i<metas.length;i++){
      if(metas[i].httpEquiv && metas[i].httpEquiv.toLowerCase()==='refresh'){
        metas[i].parentNode.removeChild(metas[i]); break;
      }
    }

    // reload every 10s with cache-busting query
    setInterval(function(){
      var base = location.pathname || '/';
      var sep = base.indexOf('?') === -1 ? '?' : '&';
      location.replace(base + sep + 'ts=' + Date.now());
    }, 10000);
  })();
  </script>

  <noscript><p>JavaScript disabled: meta refresh will still reload every 10s.</p></noscript>
</body>
</html>
