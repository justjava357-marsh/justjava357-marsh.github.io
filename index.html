<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S-Tier Live</title>
<style>
body{margin:0;background:#111;color:#ddd;font-family:Arial,sans-serif}
#o{width:300px;background:#1e2937;border:2px solid #444;margin:20px auto;padding:12px}
.header{font-size:12px;font-weight:bold;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.header::before{content:'';width:8px;height:8px;background:#10b981;border-radius:50%}
.grid{display:block;white-space:nowrap}
.s{display:inline-block;width:68px;margin:4px 2px;text-align:center;vertical-align:top}
.iw{width:52px;height:52px;border:5px solid #ef4444;border-radius:9999px;background:#0f172a;margin:0 auto 4px;display:block;position:relative}
.iw.on{border-color:#10b981}
.iw.checking{border-color:#888}
.iw img{width:42px;height:42px;border-radius:9999px;display:block;margin:auto}
.name{font-size:10px;word-break:break-all}
.last{font-size:10px;color:#888;margin-left:8px}
</style>
</head>
<body>
<div id="o">
<div class="header">LIVE STATUS <span id="last" class="last"></span></div>
<div id="g" class="grid"></div>
</div>

<script>
// grug + stone-age kindle fire fix: ultra basic, no grid/flex, no advanced css
let streamers = [];
let twitchToken = null;
const TWITCH_CLIENT_ID = '3l5p1q1v5av0qkunjqsr18we0df3z3';     // ← put your id here
const TWITCH_CLIENT_SECRET = 'jwb7pmf4hbs8tds6wqdz6tbmfl6jbo'; // ← put your secret here

async function getTwitchToken(){
  if(twitchToken) return twitchToken;
  if(!TWITCH_CLIENT_ID || !TWITCH_CLIENT_SECRET) return null;
  try{
    const r = await fetch('https://id.twitch.tv/oauth2/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({client_id:TWITCH_CLIENT_ID,client_secret:TWITCH_CLIENT_SECRET,grant_type:'client_credentials'})
    });
    const d = await r.json();
    if(d.access_token) twitchToken = d.access_token;
    return twitchToken;
  }catch(e){return null}
}

async function fetchKick(u){
  try{
    const r = await fetch(`https://kick.com/api/v1/channels/${u}`);
    const d = await r.json();
    return {is_live: !!(d.livestream && d.livestream.is_live)};
  }catch(e){return {is_live:false}}
}

async function fetchTwitch(u){
  const t = await getTwitchToken();
  if(!t) return {is_live:false};
  try{
    const r = await fetch(`https://api.twitch.tv/helix/streams?user_login=${u}`,{
      headers:{'Client-ID':TWITCH_CLIENT_ID,'Authorization':`Bearer ${t}`}
    });
    const d = await r.json();
    return {is_live: !!(d.data && d.data.length > 0)};
  }catch(e){return {is_live:false}}
}

function updateLastTime(){
  const n = new Date();
  const t = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
  document.getElementById('last').textContent = `• ${t}`;
}

async function updateLiveStatuses(){
  updateLastTime();

  // show checking
  document.querySelectorAll('.iw').forEach(iw => {
    iw.classList.add('checking');
    iw.classList.remove('on');
  });

  await Promise.all(streamers.map(async s => {
    const st = s.platform === 'kick' ? await fetchKick(s.username) : await fetchTwitch(s.username);
    const el = document.getElementById(s.id);
    if(el){
      const iw = el.querySelector('.iw');
      iw.classList.remove('checking');
      if(st.is_live) iw.classList.add('on');
    }
  }));
}

async function loadAndRender(){
  streamers = [
    {id:"kick-xqc",name:"xqc",platform:"kick",username:"xqc"},
    {id:"twitch-loltyler1",name:"loltyler1",platform:"twitch",username:"loltyler1"},
    {id:"twitch-ohnePixel",name:"ohnePixel",platform:"twitch",username:"ohnePixel"},
    {id:"twitch-Jerma985",name:"Jerma985",platform:"twitch",username:"Jerma985"},
    {id:"twitch-WowHobbs",name:"WowHobbs",platform:"twitch",username:"WowHobbs"},
    {id:"twitch-Thijs",name:"Thijs",platform:"twitch",username:"Thijs"},
    {id:"twitch-Trick2g",name:"Trick2g",platform:"twitch",username:"Trick2g"},
    {id:"twitch-Flight23white",name:"Flight23white",platform:"twitch",username:"Flight23white"}
  ];

  let html = '';
  streamers.forEach(s => {
    html += `
      <div class="s" id="${s.id}">
        <div class="iw"><img src="https://picsum.photos/id/${100 + streamers.indexOf(s)}/300/300" alt="${s.name}"></div>
        <div class="name">${s.name}</div>
      </div>`;
  });
  document.getElementById('g').innerHTML = html;

  await updateLiveStatuses();
}

window.onload = () => {
  loadAndRender();
  setInterval(updateLiveStatuses, 180000);
};
</script>
</body>
</html>
