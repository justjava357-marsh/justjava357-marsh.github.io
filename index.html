<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S-Tier Live</title>
<meta name="viewport" content="width=720, initial-scale=1.0">
<style>
body{margin:0;background:#111;color:#ddd;font-family:Arial,sans-serif}
#o{width:700px;background:#1e2937;border:2px solid #444;margin:20px auto;padding:12px}
.header{font-size:12px;font-weight:bold;margin-bottom:10px}
.dot{display:inline-block;width:8px;height:8px;background:#10b981;margin-right:6px;vertical-align:middle}
.last{font-size:10px;color:#888;margin-left:8px}
.grid{white-space:nowrap}
.s{display:inline-block;width:130px;margin:4px 2px;text-align:center;vertical-align:top}
.iw{width:100px;height:100px;border:5px solid #444;background:#0f172a;margin:0 10px 5px} /* default dark */
.iw.checking {background:#555}   /* gray while checking */
.iw.live     {background:#10b981} /* bright green = LIVE */
.iw.off      {background:#ef4444} /* red = offline */
.iw img{width:90px;height:90px;display:block;margin:10px auto 5px}
.name{font-size:10px;word-break:break-all}
#dbg{font-size:10px;color:#666;margin-top:8px;word-break:break-all;line-height:1.6}
</style>
</head>
<body>
<div id="o">
  <div class="header"><span class="dot"></span>LIVE STATUS<span id="last" class="last"></span></div>
  <div id="g" class="grid"></div>
  <div id="dbg"></div>
</div>
<script>
// Keep your credentials (they are client credentials anyway)
var TWITCH_CLIENT_ID = '3l5p1q1v5av0qkunjqsr18we0df3z3';
var TWITCH_CLIENT_SECRET = 'jwb7pmf4hbs8tds6wqdz6tbmfl6jbo';
var twitchToken = null;
var streamers = [
  {id:'s-xqc', name:'xQc', platform:'kick', username:'xqc'},
  {id:'s-tyler1', name:'T1', platform:'twitch', username:'loltyler1'},
  {id:'s-ohne', name:'ohne', platform:'twitch', username:'ohnePixel'},
  {id:'s-jerma', name:'Jerma', platform:'twitch', username:'Jerma985'},
  {id:'s-hobbs', name:'Hobbs', platform:'twitch', username:'WowHobbs'},
  {id:'s-thijs', name:'Thijs', platform:'twitch', username:'Thijs'},
  {id:'s-trick2g', name:'Trick', platform:'twitch', username:'Trick2g'},
  {id:'s-flight', name:'flight', platform:'twitch', username:'Flight23white'}
];

function log(msg) {
  var el = document.getElementById('dbg');
  if (el) el.innerHTML += msg + '<br>';
}

function getXMLHttpRequest(url, method, headers, body, callback) {
  var xhr = new XMLHttpRequest();
  xhr.open(method, url, true);
  for (var h in headers) {
    if (headers.hasOwnProperty(h)) xhr.setRequestHeader(h, headers[h]);
  }
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      callback(xhr.status, xhr.responseText);
    }
  };
  xhr.send(body);
}

function getTwitchToken(callback) {
  if (twitchToken) return callback(twitchToken);
  if (!TWITCH_CLIENT_ID || !TWITCH_CLIENT_SECRET) {
    log('no twitch creds');
    return callback(null);
  }
  var body = 'client_id=' + encodeURIComponent(TWITCH_CLIENT_ID) +
             '&client_secret=' + encodeURIComponent(TWITCH_CLIENT_SECRET) +
             '&grant_type=client_credentials';
  getXMLHttpRequest(
    'https://id.twitch.tv/oauth2/token',
    'POST',
    {'Content-Type': 'application/x-www-form-urlencoded'},
    body,
    function(status, text) {
      try {
        var d = JSON.parse(text);
        twitchToken = d.access_token || null;
        callback(twitchToken);
      } catch(e) {
        callback(null);
      }
    }
  );
}

function checkKick(username, callback) {
  getXMLHttpRequest(
    'https://kick.com/api/v1/channels/' + username,
    'GET',
    {},
    null,
    function(status, text) {
      if (status !== 200) {
        callback(false);
        return;
      }
      try {
        var d = JSON.parse(text);
        callback(!!(d.livestream && d.livestream.is_live));
      } catch(e) {
        callback(false);
      }
    }
  );
}

function checkTwitch(username, callback) {
  getTwitchToken(function(token) {
    if (!token) {
      callback(false);
      return;
    }
    getXMLHttpRequest(
      'https://api.twitch.tv/helix/streams?user_login=' + username,
      'GET',
      {
        'Client-ID': TWITCH_CLIENT_ID,
        'Authorization': 'Bearer ' + token
      },
      null,
      function(status, text) {
        if (status !== 200) {
          callback(false);
          return;
        }
        try {
          var d = JSON.parse(text);
          callback(!!(d.data && d.data.length > 0));
        } catch(e) {
          callback(false);
        }
      }
    );
  });
}

function updateLastTime() {
  var n = new Date();
  var h = ('0' + n.getHours()).slice(-2);
  var m = ('0' + n.getMinutes()).slice(-2);
  document.getElementById('last').innerHTML = ' &bull; ' + h + ':' + m;
}

function updateLiveStatuses() {
  updateLastTime();
  document.getElementById('dbg').innerHTML = '';

  // set all to checking (gray)
  for (var i = 0; i < streamers.length; i++) {
    var el = document.getElementById(streamers[i].id);
    if (el) {
      var iw = el.getElementsByTagName('div')[0];
      if (iw) iw.className = 'iw checking';
    }
  }

  function checkOne(s) {
    var isKick = s.platform === 'kick';
    (isKick ? checkKick : checkTwitch)(s.username, function(isLive) {
      var el = document.getElementById(s.id);
      if (el) {
        var iw = el.getElementsByTagName('div')[0];
        if (iw) {
          // super basic class change — most reliable on old Silk
          iw.className = isLive ? 'iw live' : 'iw off';

          // force repaint hammer for 2011 Silk
          iw.style.display = 'none';
          setTimeout(function() {
            iw.style.display = 'block';
          }, 10);
        }
      }
    });
  }

  for (var i = 0; i < streamers.length; i++) {
    checkOne(streamers[i]);
  }
}

function render() {
  var html = '';
  for (var i = 0; i < streamers.length; i++) {
    var s = streamers[i];
    html += '<div class="s" id="' + s.id + '">'
          + '<div class="iw">'
          + '<img src="https://picsum.photos/id/' + (120) + '/150/150" alt="' + s.name + '">'
          + '</div>'
          + '<div class="name">' + s.name + '</div>'
          + '</div>';
  }
  document.getElementById('g').innerHTML = html;
}

window.onload = function() {
  render();
  updateLiveStatuses();

  // Force full page reload every 3 minutes (Opera Mini workaround)
  // This is the only reliable way to wake up JS and fetch fresh data
  setInterval(function() {
    var url = window.location.href.split('?')[0];           // remove old params
    window.location.href = url + '?t=' + Date.now();        // force fresh load
  }, 18000);  // 3 minutes
};
</script>
</body>
</html>
